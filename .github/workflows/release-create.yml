name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to release (e.g. v1.2.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update manifest version
        run: |
          jq --arg version "${{ inputs.version }}" \
            '.version = $version' \
            custom_components/vikunja/manifest.json \
            > manifest.tmp.json

          mv manifest.tmp.json custom_components/vikunja/manifest.json

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add custom_components/vikunja/manifest.json

          git commit -m "Release ${{ inputs.version }}"

          git push origin main

      - name: Create tag
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          draft: true
          generate_release_notes: true